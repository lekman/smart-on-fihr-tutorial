name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: react-app/.nvmrc
          cache: "npm"
          cache-dependency-path: react-app/package-lock.json

      - name: Install react-app deps
        run: npm ci
        working-directory: react-app

      - name: Build react-app
        run: npm run build
        working-directory: react-app

      - name: Stage site
        run: |
          mkdir -p _site
          # Original tutorial site (example-smart-app/) at /
          cp -R example-smart-app _site/
          cp -R fonts images javascripts stylesheets index.html _site/
          # React app at /react-app/
          mkdir -p _site/react-app
          cp -R react-app/dist/* _site/react-app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
